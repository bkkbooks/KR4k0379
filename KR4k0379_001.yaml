body:
  text: 王度二石傳石勒傳石勒字世龍上黨武鄉人胸奴之曲裔也雄勇好騎射晉永康中流宕山東寄旅平原荏平界與平原荏平人師歡家庸耕耳恆聞鼓角鞞鐸之音勒私異之初勒鄉里原上地中生石日長類鐵騎之象園中生人參葩葉甚盛於時父老相者皆云此胡體貌奇異有大志量其終不可知勸邑人厚遇之人多哂而不信永嘉初豪傑並起與胡王陽等十八騎詣汲桑為左前督桑敗共推勒為主攻下州縣都於襄國世說新語注四勒稱趙王令武鄉耆舊赴襄國拜李陽參軍都尉勒微時居與邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相打揲互有勝負御覽四百九十六引作勒別傳冬十一月大雪平地三尺勒主簿程朗諫勒不從出獵墮馬顧左右曰不從主簿之言而致墮馬賜朗絹百匹以旌忠亮御覽八百三十二以咸和三年改元曰太和荏平民師歡上黑兔令曰按記應白兔為瑞此黑兔曰祥外檢典舊議者以為黑兔見水德之祥往公孫臣以為漢家土行當有黃龍為瑞後黃龍見於成紀遂從土德今大趙革命以水受金夫兔陰獸玄水色黑色見以青應行以推之黑兔上應云云類聚九十九後僭正號世說注四死諡明皇帝世說注四石虎傳石虎字季龍勒從弟年十七八身長七尺五守好弓馬射獵迅健有勇力同時等類多畏憚之御覽三百八十六引作石虎別傳武鄉長城縣民韓強在長城縣西山巖石闕中得玄璽一所方四寸厚二寸與璽同文曰受命於天既壽永昌虎以為瑞御覽六百八二引作石虎別傳書鈔百三十一誤作石勒別傳十三年永和三年春二月虎率三公九卿躬耕藉田后率三夫人命婦祠先蠶於近郊是歲八月雨雪大寒行旅凍死御覽三十四引作石虎別傳王度二石僞事劉曜躬領將士二十七萬衆大舉征勒勒養子生為衛將軍領三千人鎮洛金墉城曜攻生城不能下不覺勒軍卒至天曉曜軍當攻金墉城勒軍入正與曜軍相遇即交戰曜軍大破登時生擒曜身御覽三百二十六石虎建康二年遷都鄴宮照一大鏡不見頭書鈔百三十六按此引作三石遺事郭權降石虎虎問權曰卿若得吾者當殺否權曰若當時得至尊必殺不疑也虎曰卿健將也因與共言事御覽二百七十五石虎攻中山得鄭略之妹為妻至相敬待下闕無兒鄭復生男崔求養鄭不許一月卒病死鄭讒崔謂妾多養胡子虎時踞胡床於庭中大怒索弓箭崔聞欲殺之徒跣至虎前曰公勿枉殺妾乞聽妾言虎不聽但言促還坐無預卿崔便去來未至虎於後射之中腰而覆御覽三百七十一佛圖澄死時衆官皆殯斂以澄生所持金錫杖銀鉢盂內著棺中為其理石作椁葬畢經年冉閔後故發椁開棺視之了不見體骨處所唯見杖鉢存焉御覽五百五十二又七百十書鈔百三十三引略又作三石遺事石混降說鄴中有鳳皇將九雛在延明門外道西御覽百十五石混說建武十四年忽有爛馬一匹有四目倚著殿中十餘日突去不知卯在占經一百十六
